name: I've had enough of it, enough of it

on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - extra: ""
            nickname: "linux-amd64v4-glibc"
          - extra: "CGO_ENABLED=0"
            nickname: "linux-amd64-musl"
          - extra: "GOARCH=arm64"
            nickname: "linux-arm64-musl"

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Set up Go
        uses: actions/setup-go@main
        with:
          go-version: 'stable'
          
      - name: Build!
        shell: bash
        run: |
          ${{ matrix.extra }} go build
          mv go-rustdesk-server "go-rustdesk-server-${{ matrix.nickname }}"

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V2.0.5
          files: go-rustdesk-server*
          body: |
            # 📝 Release Notes
            - Rewrote the code.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
