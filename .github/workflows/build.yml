name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────
  # Job 1: Build go-rustdesk-server binaries
  # ────────────────────────────────────────────
  build-binary:
    name: Binary · ${{ matrix.nickname }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - extra: ""
            nickname: "linux-amd64v4-glibc"
          - extra: "CGO_ENABLED=0"
            nickname: "linux-amd64-musl"
          - extra: "GOARCH=arm64"
            nickname: "linux-arm64-musl"
          - extra: "GOOS=darwin GOARCH=arm64"
            nickname: "darwin-arm64"
          - extra: "GOOS=windows GOARCH=amd64"
            nickname: "windows-amd64.exe"
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Set up Go
        uses: actions/setup-go@main
        with:
          go-version: 'stable'

      - name: Build
        shell: bash
        run: |
          ${{ matrix.extra }} go build
          mv go-rustdesk-server* "go-rustdesk-server-${{ matrix.nickname }}"

      - name: Upload artifact
        uses: actions/upload-artifact@main
        with:
          name: binary-${{ matrix.nickname }}
          path: go-rustdesk-server-${{ matrix.nickname }}

  # ────────────────────────────────────────────
  # Job 2: Build rsop OpenWrt packages
  # ────────────────────────────────────────────
  build-rsop:
    name: OpenWrt · ${{ matrix.patch_arch }}
    runs-on: ubuntu-latest
    needs: build-binary
    env:
      project_name: "rsop"
    strategy:
      fail-fast: false
      matrix:
        include:
          - tags: "linux-amd64-musl"
            patch_arch: "x86_64"
            sdk_name: "openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64"
          - tags: "linux-arm64-musl"
            patch_arch: "aarch64_generic"
            sdk_name: "openwrt-sdk-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64"
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          path: ${{ env.project_name }}

      - name: Preparing build environment
        uses: mokanove/mokanove/actions/build-env@main

      - name: Prepare SDK
        uses: mokanove/mokanove/actions/prepare-sdk@main
        with:
          sdk_name: ${{ matrix.sdk_name }}

      - name: Download binary for OpenWrt injection
        uses: actions/download-artifact@main
        with:
          name: binary-${{ matrix.tags }}
          path: binary

      - name: Preparation before compilation
        shell: bash
        run: |
          mv ${{ env.project_name }} ${{ matrix.sdk_name }}/package/
          cd ${{ matrix.sdk_name }}/package/${{ env.project_name }}
          if [ "${{ matrix.patch_arch }}" != "x86_64" ]; then
            sed -i 's/x86_64/${{ matrix.patch_arch }}/g' ./Makefile
          fi
          cp $GITHUB_WORKSPACE/binary/go-rustdesk-server-${{ matrix.tags }} \
             ./root/etc/rustdesk/go-rustdesk-server
          chmod +x ./root/etc/rustdesk/go-rustdesk-server
          rm -f ./root/etc/rustdesk/DONOTREMOVE

      - name: Build
        shell: bash
        run: |
          cd ${{ matrix.sdk_name }}
          make package/${{ env.project_name }}/compile V=s -j$(nproc)

      - name: Upload artifact
        shell: bash
        run: |
          VERSION=$(cat ${{ env.project_name }}/VERSION)
          mv ${{ matrix.sdk_name }}/bin/packages/*/base/*.apk \
             rsop-${VERSION}-${{ matrix.patch_arch }}.apk

      - name: Upload apk artifact
        uses: actions/upload-artifact@main
        with:
          name: apk-${{ matrix.patch_arch }}
          path: rsop-*.apk

  # ────────────────────────────────────────────
  # Job 3: Collect everything and release once
  # ────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-rsop
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@main
        with:
          pattern: "{binary-*,apk-*}"
          path: dist
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.version.outputs.version }}
          files: dist/*
          body: |
            # 📝 Release Notes
            - rsop and go-rustdesk-server have now been merged into one project!
            # ⚠️ WARNING:
            > If you are upgrading from rdks or a version lower than rsop V0.3.3,
            > please execute the following command **before** installing this version:
            ```
            rm -rf /etc/rustdesk
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
